# ---------------------------------------------------------------------------
# Mashtruesi - application configuration
# ---------------------------------------------------------------------------

# Human-friendly application name shown in logs
spring.application.name=Mashtruesi

# --- H2 in-memory database (relational, zero install) ----------------------
# DB_CLOSE_DELAY=-1 keeps the in-memory DB alive for the whole JVM lifetime,
# so the data we seed at startup survives across requests.
spring.datasource.url=jdbc:h2:mem:mashtruesi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate (R7) --------------------------------------------------
# create-drop lets Hibernate build the schema for our @Entity classes on start.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- H2 web console (handy during the live demo: http://localhost:8080/h2) --
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# --- Server ----------------------------------------------------------------
# Railway (and similar PaaS) assign the port dynamically via $PORT; 8080 is
# the local-dev fallback.
server.port=${PORT:8080}
